<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Join the Channel</title>

<!-- ============================================================
     META PIXEL BASE CODE
     Replace YOUR_PIXEL_ID below. This ONLY loads the pixel.
     It does NOT fire a Lead event on page load — that happens
     only when the user clicks the Telegram button (see script
     at the bottom of the page).
     ============================================================ -->
<script>
  !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
  n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,
  document,'script','https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', 'YOUR_PIXEL_ID');
  fbq('track', 'PageView'); // PageView is fine to fire on load — this is NOT the Lead event
</script>
<noscript><img height="1" width="1" style="display:none"
  src="https://www.facebook.com/tr?id=YOUR_PIXEL_ID&ev=PageView&noscript=1"/></noscript>

<style>
  :root {
    --grass: #0b3d2e;
    --grass-light: #145c3f;
    --ball-red: #b3202a;
    --cream: #f6f1e4;
    --ink: #14231d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: radial-gradient(circle at top, var(--grass-light), var(--grass) 70%);
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    max-width: 420px;
    width: 100%;
    background: rgba(0,0,0,0.18);
    border: 1px solid rgba(246,241,228,0.15);
    border-radius: 18px;
    padding: 40px 32px;
    text-align: center;
    backdrop-filter: blur(4px);
  }
  .eyebrow {
    letter-spacing: 3px;
    font-size: 12px;
    text-transform: uppercase;
    color: #d7c88f;
    margin-bottom: 12px;
  }
  h1 {
    font-size: 28px;
    line-height: 1.2;
    margin: 0 0 14px;
  }
  p.sub {
    color: #cfe3d8;
    font-size: 15px;
    margin: 0 0 28px;
  }
  .join-btn {
    display: inline-block;
    width: 100%;
    background: var(--ball-red);
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    text-decoration: none;
    padding: 16px 20px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .join-btn:hover { background: #931821; transform: translateY(-1px); }
  .join-btn:active { transform: translateY(0); }
  .fine {
    margin-top: 18px;
    font-size: 12px;
    color: #9fb8ab;
  }
  #status {
    margin-top: 14px;
    font-size: 13px;
    min-height: 16px;
    color: #d7c88f;
  }
</style>
</head>
<body>

<div class="card">
  <div class="eyebrow">Akash Cricket Zone Updates</div>
  <h1>Live scores. Match alerts.<br>Zero noise.</h1>
  <p class="sub">Tap below to join the channel — instant IPL updates, squad news, and match-day alerts.</p>

  <button id="joinBtn" class="join-btn">Join Telegram Channel →</button>
  <div id="status"></div>

  <div class="fine">You'll be redirected to Telegram</div>
</div>

<script>
  // ============================================================
  // OUTBOUND CLICK TRACKING
  // This is the core fix: the "Lead" event fires ONLY when the
  // user actually clicks through to Telegram — not on page load.
  // The same event_id is sent to both the Pixel (client-side) and
  // your backend (which forwards to CAPI server-side). Meta uses
  // this shared event_id to deduplicate the two into ONE event.
  // ============================================================

  const TELEGRAM_LINK = "https://t.me/+xYeTqFknzMs3ODc1";
  const BACKEND_URL = "/api/track-lead"; // same domain — Vercel serverless function

  function generateEventId() {
    return 'lead_' + Date.now() + '_' + Math.random().toString(36).substring(2, 10);
  }

  function getCookie(name) {
    const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return match ? match[2] : null;
  }

  document.getElementById('joinBtn').addEventListener('click', function (e) {
    e.preventDefault();
    const btn = e.currentTarget;
    const statusEl = document.getElementById('status');
    const eventId = generateEventId();

    // 1) Fire the Pixel Lead event client-side, tagged with eventId
    if (typeof fbq === 'function') {
      fbq('track', 'Lead', { content_name: 'telegram_join_click' }, { eventID: eventId });
    }

    // 2) Send the SAME event_id + browser identifiers to your backend
    //    so it can fire the matching CAPI event server-side.
    //    fbp/fbc cookies let Meta match this to the right user/ad.
    const payload = {
      event_id: eventId,
      event_source_url: window.location.href,
      fbp: getCookie('_fbp'),
      fbc: getCookie('_fbc'),
      user_agent: navigator.userAgent
    };

    statusEl.textContent = "Redirecting…";
    btn.disabled = true;

    // Use fetch with keepalive so the request completes even as
    // the browser navigates away to Telegram right after.
    fetch(BACKEND_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      keepalive: true
    }).catch(function () {
      // Even if this fails, don't block the user from reaching Telegram.
    });

    // 3) Redirect to Telegram immediately after — don't make the
    //    user wait on the network request.
    setTimeout(function () {
      window.location.href = TELEGRAM_LINK;
    }, 150);
  });
</script>

</body>
</html>
